<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="すうじのもり" />
<title>すうじのもり 🐰</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Fredoka:wght@500;700&display=swap">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    overscroll-behavior: none;
  }
  #app { width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden; }
  button { font-family: inherit; cursor: pointer; }
 
  /* ===== キーフレーム ===== */
  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes hopIn {
    0% { transform: translateY(-30px) scale(0.5); opacity: 0; }
    60% { transform: translateY(5px) scale(1.1); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    30% { transform: scale(1.3) rotate(180deg); opacity: 1; }
    100% { transform: scale(0.6) rotate(360deg) translateY(-30px); opacity: 0; }
  }
  @keyframes cheer {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-10px) rotate(-5deg); }
    75% { transform: translateY(-10px) rotate(5deg); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
 
  /* ===== 共通 ===== */
  .screen { min-height: 100vh; width: 100%; position: relative; padding: 16px 16px 32px; }
  .back-btn {
    position: absolute; top: 14px; left: 14px; z-index: 20;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 10px 16px; background: #fff; border-radius: 999px;
    border: 3px solid #3A3052; box-shadow: 0 3px 0 #3A3052;
    font-weight: 900; color: #3A3052; font-size: 15px;
  }
  .back-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3A3052; }
  .title { font-weight: 900; color: #3A3052; text-align: center; letter-spacing: 0.03em; }
  .subtitle { font-weight: 700; color: #7A6B94; text-align: center; }
  .bubble-box {
    background: #fff; border: 4px solid #3A3052;
    border-radius: 24px; box-shadow: 0 5px 0 #3A3052;
    padding: 10px 20px; position: relative;
  }
  .bubble-tri::before {
    content: ''; position: absolute; top: -14px; left: 44%;
    border-left: 10px solid transparent; border-right: 10px solid transparent;
    border-bottom: 14px solid #3A3052;
  }
  .bubble-tri::after {
    content: ''; position: absolute; top: -10px; left: 45%;
    border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-bottom: 11px solid #fff;
  }
  .sparkle-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 10; }
 
  /* ===== ホーム ===== */
  .home-bg { background: linear-gradient(180deg, #FFF3F8 0%, #E8F1FF 60%, #E5FFF3 100%); }
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 440px; margin: 16px auto 0; }
  .mode-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 18px 10px; border-radius: 24px; border: 4px solid #3A3052;
    box-shadow: 0 6px 0 #3A3052; min-height: 150px; transition: transform 0.1s;
    animation: popIn 0.5s ease-out both;
  }
  .mode-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #3A3052; }
  .range-card {
    margin: 14px auto 4px; padding: 10px 14px; max-width: 440px; width: calc(100% - 8px);
    background: rgba(255,255,255,0.7); border-radius: 20px; border: 3px solid #3A3052;
    box-shadow: 0 3px 0 #3A3052;
    display: flex; flex-direction: column; gap: 8px;
  }
  .range-pills { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .range-pill {
    padding: 6px 14px; border-radius: 999px; border: 2.5px solid #3A3052;
    background: #fff; color: #3A3052; font-weight: 900; font-size: 0.85rem;
    font-family: 'Fredoka', 'M PLUS Rounded 1c', sans-serif;
  }
  .range-pill.active { background: #FF8FB5; color: #fff; box-shadow: 0 2px 0 #3A3052; }
 
  /* ===== Countモード ===== */
  .count-bg { background: linear-gradient(180deg, #FFF8E7 0%, #FFE8D6 100%); }
  .big-number {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 7rem;
    line-height: 1; text-shadow: 4px 4px 0 #3A3052;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .bunny-area {
    margin: 8px auto 0; max-width: 440px; min-height: 180px;
    padding: 14px; background: rgba(255,255,255,0.55);
    border-radius: 24px; border: 3px dashed #D8A878;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  .bunny-area > div:not(.empty) { display: flex; justify-content: center; align-items: center; }
  .empty-hint { grid-column: span 5; text-align: center; color: #B0A090; font-weight: 700; padding: 60px 0; }
  .action-fixed { position: fixed; bottom: 18px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 18px; z-index: 15; }
  .big-pill {
    width: 100%; max-width: 380px; padding: 18px 0;
    border-radius: 999px; border: 4px solid #3A3052; box-shadow: 0 6px 0 #3A3052;
    font-weight: 900; font-size: 1.3rem; transition: transform 0.1s;
  }
  .big-pill:active { transform: translateY(4px); box-shadow: 0 2px 0 #3A3052; }
 
  /* ===== Readモード ===== */
  .read-bg { background: linear-gradient(180deg, #E8F7D5 0%, #D6F3EA 100%); }
  .read-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 440px; margin: 20px auto 0; }
  .read-card {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    border-radius: 24px; border: 4px solid #3A3052; box-shadow: 0 5px 0 #3A3052;
    transition: all 0.1s; animation: popIn 0.4s ease-out both;
  }
  .read-card:active { transform: translateY(3px); box-shadow: 0 2px 0 #3A3052; }
  .read-card.active { border-color: #FF6B9D; box-shadow: 0 2px 0 #3A3052; transform: translateY(3px); }
  .read-digit {
    width: 56px; height: 56px; border-radius: 16px; border: 3px solid #3A3052;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 2rem; color: #3A3052;
    flex-shrink: 0;
  }
 
  /* ===== Listenモード ===== */
  .listen-bg { background: linear-gradient(180deg, #DEF0FA 0%, #E5E3FF 100%); }
  .score-badge {
    position: absolute; top: 14px; right: 14px;
    padding: 6px 14px; border-radius: 999px; background: #FFE27A;
    border: 3px solid #3A3052; display: flex; align-items: center; gap: 4px;
    font-family: 'Fredoka', sans-serif; font-weight: 700; color: #3A3052;
  }
  .choices-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 440px; margin: 24px auto 0; }
  .choice-btn {
    aspect-ratio: 1; border-radius: 24px; border: 4px solid #3A3052; box-shadow: 0 5px 0 #3A3052;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.1s; animation: popIn 0.3s ease-out both;
  }
  .choice-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 #3A3052; }
  .choice-digit { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 2.8rem; color: #3A3052; line-height: 1; }
  .choice-hira { font-weight: 900; font-size: 1rem; color: #3A3052; margin-top: 4px; }
 
  /* ===== Speakモード ===== */
  .progress-dots { display: flex; justify-content: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; padding: 0 12px; }
  .progress-dot { height: 8px; border-radius: 4px; border: 1.5px solid #3A3052; transition: all 0.3s; }
  .speak-big-box {
    width: 180px; height: 180px; border-radius: 40px;
    border: 5px solid #3A3052; box-shadow: 0 8px 0 #3A3052;
    display: flex; align-items: center; justify-content: center;
    margin: 16px auto 0;
    animation: popIn 0.5s ease-out, floaty 3s ease-in-out infinite 0.5s;
  }
  .speak-big-digit { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 9rem; line-height: 1; color: #3A3052; text-shadow: 0 3px 0 rgba(255,255,255,0.4); }
  .speak-hira { font-weight: 900; font-size: 2.2rem; color: #3A3052; text-align: center; margin-top: 12px; letter-spacing: 0.15em; }
 
  /* ===== Writeモード ===== */
  .write-bg { background: linear-gradient(180deg, #FFE8F3 0%, #E8F7FF 100%); }
  .canvas-wrap {
    margin: 16px auto 0; max-width: 360px; aspect-ratio: 1;
    background: #fff; border: 5px solid #3A3052; border-radius: 32px;
    box-shadow: 0 6px 0 #3A3052; position: relative; overflow: hidden;
  }
  .trace-canvas, .guide-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
  .guide-canvas { pointer-events: none; }
 
  /* ===== くらべっこ ===== */
  .compare-bg { background: linear-gradient(180deg, #D6F3EA 0%, #E8F7D5 100%); }
  .compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    max-width: 460px; margin: 20px auto 0; padding: 0 8px;
  }
  .compare-card {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 18px 10px; border-radius: 28px; border: 4px solid #3A3052;
    box-shadow: 0 5px 0 #3A3052; animation: popIn 0.4s ease-out both;
    transition: all 0.15s;
  }
  .compare-card:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 #3A3052; }
  .compare-card.winner { background: #B8E986 !important; }
  .compare-card.loser  { opacity: 0.45; }
  .compare-digit {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 3.2rem;
    color: #3A3052; line-height: 1;
  }
  .compare-dots {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;
    max-width: 160px; min-height: 60px;
  }
  .compare-dot { font-size: 1.1rem; line-height: 1; }

  /* ===== けいさん ===== */
  .math-bg { background: linear-gradient(180deg, #FFEEDD 0%, #FFF6D1 100%); }
  .math-equation {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 3.6rem;
    color: #3A3052; margin-top: 14px; flex-wrap: wrap;
  }
  .math-pic-row {
    display: flex; justify-content: center; align-items: center; gap: 14px;
    margin-top: 10px; flex-wrap: wrap;
  }
  .math-pic-group {
    padding: 8px 12px; background: rgba(255,255,255,0.7);
    border: 3px dashed #D8A878; border-radius: 20px;
    display: flex; flex-wrap: wrap; max-width: 150px; justify-content: center; gap: 2px;
  }
  .math-pic { font-size: 1.4rem; line-height: 1.1; }
  .math-op { font-size: 2.8rem; font-weight: 900; color: #FF6B9D; }

  /* ===== おはなし もんだい ===== */
  .story-bg { background: linear-gradient(180deg, #FFE8F3 0%, #FFF6D1 100%); }
  .story-card {
    background: rgba(255,255,255,0.88);
    border: 4px dashed #D89AB0;
    border-radius: 24px;
    padding: 14px 18px;
    max-width: 440px;
    margin: 10px auto 6px;
    font-weight: 700;
    font-size: 1.02rem;
    line-height: 1.7;
    color: #3A3052;
    text-align: left;
  }
  .story-emoji-row {
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 10px; margin: 6px auto 4px; max-width: 440px;
  }
  .story-emoji-group {
    padding: 6px 10px; background: rgba(255,255,255,0.7);
    border: 3px dashed #D89AB0; border-radius: 18px;
    display: flex; flex-wrap: wrap; max-width: 160px; justify-content: center; gap: 2px;
  }
  .story-emoji { font-size: 1.5rem; line-height: 1.1; }
  .story-replay-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #FFD166; border: 3px solid #3A3052; border-radius: 999px;
    padding: 8px 18px; font-weight: 900; font-size: 0.9rem; color: #3A3052;
    box-shadow: 0 4px 0 #3A3052; cursor: pointer; margin: 4px auto;
    font-family: inherit;
  }
  .story-replay-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #3A3052; }

  /* ===== かぞえかた ===== */
  .counter-bg { background: linear-gradient(180deg, #E5E3FF 0%, #FFE8F3 100%); }
  .counter-tabs {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    max-width: 460px; margin: 10px auto 0; padding: 0 10px;
  }
  .counter-tab {
    padding: 8px 14px; border-radius: 999px; border: 3px solid #3A3052;
    background: #fff; font-weight: 900; font-size: 0.85rem; color: #3A3052;
  }
  .counter-tab.active { box-shadow: 0 3px 0 #3A3052; transform: translateY(-1px); }
  .counter-stage {
    max-width: 420px; margin: 14px auto 0; padding: 16px;
    background: rgba(255,255,255,0.75); border: 4px solid #3A3052;
    border-radius: 28px; box-shadow: 0 5px 0 #3A3052;
  }
  .counter-items {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;
    min-height: 80px; padding: 8px;
  }
  .counter-item { font-size: 2rem; line-height: 1; animation: hopIn 0.35s ease-out both; }
  .counter-stepper {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-top: 12px;
  }
  .counter-step-btn {
    width: 54px; height: 54px; border-radius: 50%;
    border: 4px solid #3A3052; box-shadow: 0 4px 0 #3A3052;
    font-family: 'Fredoka', sans-serif; font-size: 1.8rem; font-weight: 700;
    color: #3A3052; background: #fff;
  }
  .counter-step-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #3A3052; }
  .counter-step-btn:disabled { opacity: 0.4; }
  .counter-reading {
    font-weight: 900; font-size: 2rem; color: #3A3052;
    text-align: center; flex: 1; font-family: 'Fredoka', 'M PLUS Rounded 1c', sans-serif;
  }

  /* ===== シールちょう ===== */
  .stickers-bg { background: linear-gradient(180deg, #FFF6D1 0%, #FFE8F3 100%); }
  .sticker-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
    gap: 10px; max-width: 460px; margin: 14px auto 0; padding: 10px;
    background: rgba(255,255,255,0.75); border: 4px solid #3A3052;
    border-radius: 28px; box-shadow: 0 5px 0 #3A3052; min-height: 160px;
  }
  .sticker-cell {
    aspect-ratio: 1; border-radius: 50%; border: 3px solid #3A3052;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; animation: popIn 0.4s ease-out both;
  }
  .sticker-empty {
    grid-column: 1 / -1; text-align: center; color: #B0A090;
    font-weight: 700; padding: 30px 0;
  }
  .backup-btns {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .backup-btn {
    padding: 10px 18px; border-radius: 999px; border: 3px solid #3A3052;
    box-shadow: 0 3px 0 #3A3052; background: #fff; color: #3A3052;
    font-weight: 900; font-size: 0.9rem;
  }
  .backup-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3A3052; }

  /* ===== ユーティリティ ===== */
  .flex-col-center { display: flex; flex-direction: column; align-items: center; }
  .flex-center { display: flex; align-items: center; justify-content: center; }
  .w-full { width: 100%; }
  .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
  .row { display: flex; flex-direction: row; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="app"></div>
 
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
 
<script type="text/babel">
const { useState, useEffect, useRef } = React;
 
// ======== 数字データ（1〜100） ========
const PALETTE = [
  { color: '#FFB5D8', bgSoft: '#FFE8F3' },
  { color: '#FFCBA4', bgSoft: '#FFEEDD' },
  { color: '#FFE27A', bgSoft: '#FFF6D1' },
  { color: '#B8E986', bgSoft: '#E8F7D5' },
  { color: '#8EE1C8', bgSoft: '#D6F3EA' },
  { color: '#A8D8F0', bgSoft: '#DEF0FA' },
  { color: '#B8B5FF', bgSoft: '#E5E3FF' },
  { color: '#E0A8E8', bgSoft: '#F3DEF7' },
  { color: '#FFA8B8', bgSoft: '#FFDDE3' },
  { color: '#FFD166', bgSoft: '#FFEFC7' },
];
const DIGIT_HIRA  = ['', 'いち', 'に', 'さん', 'よん', 'ご', 'ろく', 'なな', 'はち', 'きゅう'];
const TENS_HIRA   = ['', 'じゅう', 'にじゅう', 'さんじゅう', 'よんじゅう', 'ごじゅう', 'ろくじゅう', 'ななじゅう', 'はちじゅう', 'きゅうじゅう'];
const DIGIT_KANJI = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
const TENS_KANJI  = ['', '十', '二十', '三十', '四十', '五十', '六十', '七十', '八十', '九十'];

const NUMBERS = Array.from({ length: 100 }, (_, i) => {
  const n = i + 1;
  let hira, kanji;
  if (n === 100) {
    hira = 'ひゃく';
    kanji = '百';
  } else {
    const tens = Math.floor(n / 10);
    const ones = n % 10;
    hira  = TENS_HIRA[tens]  + DIGIT_HIRA[ones];
    kanji = TENS_KANJI[tens] + DIGIT_KANJI[ones];
  }
  const p = PALETTE[i % PALETTE.length];
  return { digit: n, kanji, hira, color: p.color, bgSoft: p.bgSoft };
});
 
// ======== 音声 ========
let jaVoice = null;
// 女性・キャラクター寄りの声を優先して選ぶ
const FEMALE_VOICE_HINTS = [
  'kyoko',            // macOS / iOS 日本語女性
  'o-ren',            // macOS 追加音声
  'haruka', 'ayumi', 'sayaka', 'nanami', 'mizuki', 'ichie', // Windows / Edge 日本語女性
  'google 日本語',     // Android / Chrome
  'ja-jp-standard-a', 'ja-jp-standard-b',        // Google Cloud（女性）
  'ja-jp-wavenet-a',  'ja-jp-wavenet-b',
  'ja-jp-neural2-b',
  'female', 'woman', '女', 'じょせい',
];
const MALE_VOICE_HINTS = [
  'otoya', 'ichiro', 'hattori', 'takumi',
  'ja-jp-standard-c', 'ja-jp-standard-d',
  'ja-jp-wavenet-c',  'ja-jp-wavenet-d',
  'male', 'man', '男', 'だんせい',
];
function loadJaVoice() {
  const voices = window.speechSynthesis.getVoices();
  const ja = voices.filter(v => v.lang === 'ja-JP' || (v.lang || '').toLowerCase().startsWith('ja'));
  if (ja.length === 0) { jaVoice = null; return; }
  const lower = (v) => (v.name + ' ' + (v.voiceURI || '')).toLowerCase();
  // 1) 女性ヒントに一致する声を優先順で探す
  for (const hint of FEMALE_VOICE_HINTS) {
    const hit = ja.find(v => lower(v).includes(hint));
    if (hit) { jaVoice = hit; return; }
  }
  // 2) 男性ヒントを含まないものを選ぶ
  const nonMale = ja.find(v => !MALE_VOICE_HINTS.some(h => lower(v).includes(h)));
  jaVoice = nonMale || ja[0];
}
function speak(text, rate = 0.9, pitch = 1.45) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = rate;
  // キャラクターっぽく可愛い高さに底上げ（SpeechSynthesis の上限 2.0）
  u.pitch = Math.min(2, pitch * 1.25);
  u.volume = 1;
  if (jaVoice) u.voice = jaVoice;
  window.speechSynthesis.speak(u);
}
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playChime(type = 'pop') {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'pop') {
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
    } else if (type === 'success') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    } else if (type === 'gentle') {
      osc.frequency.setValueAtTime(392, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(349, ctx.currentTime + 0.2);
    } else if (type === 'draw') {
      osc.frequency.setValueAtTime(880, ctx.currentTime);
    }
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch (e) {}
}

// ======== 保存（IndexedDB） ========
const DB_NAME = 'suuji_no_mori';
const DB_VERSION = 1;
const STORE = 'kv';
let _dbPromise = null;
function openDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) { reject(new Error('no indexedDB')); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}
function dbGet(key) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  })).catch(() => undefined);
}
function dbSet(key, value) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  })).catch(() => {});
}
function dbAll() {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const result = {};
    const req = store.openCursor();
    req.onsuccess = (e) => {
      const cur = e.target.result;
      if (cur) { result[cur.key] = cur.value; cur.continue(); }
      else resolve(result);
    };
    req.onerror = () => reject(req.error);
  })).catch(() => ({}));
}

function useStored(key, defaultValue) {
  const [value, setValue] = useState(defaultValue);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    let alive = true;
    dbGet(key).then(v => {
      if (!alive) return;
      if (v !== undefined) setValue(v);
      setLoaded(true);
    });
    return () => { alive = false; };
  }, [key]);
  const save = (next) => {
    setValue(prev => {
      const v = typeof next === 'function' ? next(prev) : next;
      dbSet(key, v);
      return v;
    });
  };
  return [value, save, loaded];
}

// ======== かいてみよう（なぞり書き） ========
function WriteMode({ onBack, range, awardSticker }) {
  const pool = NUMBERS.slice(0, range);
  const [idx, setIdx] = useState(0);
  const [done, setDone] = useState(false);
  const traceCanvasRef = useRef(null);
  const guideCanvasRef = useRef(null);
  const drawingRef = useRef(false);
  const lastPointRef = useRef(null);
  const safeIdx = Math.min(idx, pool.length - 1);
  const current = pool[safeIdx];
 
  // ガイド（薄い数字）を描画
  const drawGuide = () => {
    const canvas = guideCanvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, rect.height);
 
    // 薄いガイド数字
    ctx.fillStyle = current.color + '55';
    ctx.strokeStyle = current.color;
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.font = `900 ${rect.height * 0.75}px 'Fredoka', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const text = String(current.digit);
    ctx.fillText(text, rect.width / 2, rect.height / 2);
    ctx.strokeText(text, rect.width / 2, rect.height / 2);
    ctx.setLineDash([]);
 
    // 書き順を示す矢印（スタートポイント）
    const startPoints = {
      1: { x: rect.width * 0.45, y: rect.height * 0.25 },
      2: { x: rect.width * 0.35, y: rect.height * 0.32 },
      3: { x: rect.width * 0.38, y: rect.height * 0.3 },
      4: { x: rect.width * 0.4, y: rect.height * 0.22 },
      5: { x: rect.width * 0.6, y: rect.height * 0.22 },
      6: { x: rect.width * 0.55, y: rect.height * 0.22 },
      7: { x: rect.width * 0.35, y: rect.height * 0.3 },
      8: { x: rect.width * 0.5, y: rect.height * 0.22 },
      9: { x: rect.width * 0.55, y: rect.height * 0.32 },
      10: { x: rect.width * 0.3, y: rect.height * 0.25 },
    };
    const sp = startPoints[current.digit];
    if (sp) {
      ctx.fillStyle = '#FF6B9D';
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  };
 
  // キャンバスを初期化
  const initTraceCanvas = () => {
    const canvas = traceCanvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = current.color;
    ctx.lineWidth = 18;
  };
 
  const clearTrace = () => {
    const canvas = traceCanvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setDone(false);
  };
 
  useEffect(() => {
    setTimeout(() => { drawGuide(); initTraceCanvas(); clearTrace(); }, 50);
    setDone(false);
    setTimeout(() => speak(`${current.hira}　を かいてみよう`, 0.85, 1.3), 300);
  }, [idx, range]);
 
  const getPos = (e) => {
    const canvas = traceCanvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches && e.touches[0];
    const clientX = touch ? touch.clientX : e.clientX;
    const clientY = touch ? touch.clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  };
 
  const startDraw = (e) => {
    e.preventDefault();
    drawingRef.current = true;
    const pos = getPos(e);
    lastPointRef.current = pos;
    const ctx = traceCanvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 9, 0, Math.PI * 2);
    ctx.fillStyle = current.color;
    ctx.fill();
  };
  const moveDraw = (e) => {
    if (!drawingRef.current) return;
    e.preventDefault();
    const pos = getPos(e);
    const ctx = traceCanvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(lastPointRef.current.x, lastPointRef.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = current.color;
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.stroke();
    lastPointRef.current = pos;
  };
  const endDraw = (e) => {
    if (!drawingRef.current) return;
    drawingRef.current = false;
  };
 
  const complete = () => {
    setDone(true); playChime('success');
    const praises = ['じょうずに かけたね！', 'はなまる！', 'すごい！', 'やったね！'];
    speak(praises[Math.floor(Math.random() * praises.length)], 0.9, 1.4);
    awardSticker && awardSticker('write', `${current.digit} を かけた`);
    setTimeout(() => {
      if (safeIdx < pool.length - 1) setIdx(i => i + 1);
      else setIdx(0);
    }, 2200);
  };

  const next = () => { setIdx(i => (i < pool.length - 1) ? i + 1 : 0); };
  const prev = () => { setIdx(i => (i > 0) ? i - 1 : pool.length - 1); };

  return (
    <div className="screen write-bg">
      <BackButton onClick={onBack} />
      <div className="progress-dots">
        {pool.map((n, i) => (
          <div key={n.digit} className="progress-dot" style={{
            width: i === safeIdx ? '24px' : '8px',
            background: i <= safeIdx ? n.color : '#E0D8EC',
          }} />
        ))}
      </div>
      <h2 className="title" style={{ fontSize: '1.3rem', marginTop: '10px' }}>✏️ ゆびで なぞろう</h2>
      <p className="subtitle" style={{ fontSize: '0.88rem', marginTop: '4px' }}>
        <span style={{ color: '#FF6B9D' }}>●</span> から はじめてね
      </p>
 
      <div className="row" style={{ gap: '16px', marginTop: '10px' }}>
        <div style={{
          width: '70px', height: '70px', borderRadius: '20px',
          background: current.color, border: '4px solid #3A3052',
          boxShadow: '0 4px 0 #3A3052',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'Fredoka, sans-serif', fontWeight: 700, fontSize: '2.8rem', color: '#3A3052',
        }}>{current.digit}</div>
        <div style={{ fontWeight: 900, fontSize: '1.8rem', color: '#3A3052' }}>{current.hira}</div>
      </div>
 
      <div className="canvas-wrap">
        <canvas ref={guideCanvasRef} className="guide-canvas" />
        <canvas ref={traceCanvasRef} className="trace-canvas"
          onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={moveDraw} onTouchEnd={endDraw}
        />
      </div>
 
      <div className="flex-center" style={{ gap: '10px', marginTop: '14px', flexWrap: 'wrap', padding: '0 12px' }}>
        <button onClick={prev} style={{
          padding: '10px 18px', borderRadius: '999px',
          background: '#fff', border: '3px solid #3A3052', boxShadow: '0 3px 0 #3A3052',
          fontWeight: 900, fontSize: '0.95rem', color: '#3A3052',
        }}>← まえ</button>
        <button onClick={clearTrace} style={{
          padding: '10px 18px', borderRadius: '999px',
          background: '#FFF6D1', border: '3px solid #3A3052', boxShadow: '0 3px 0 #3A3052',
          fontWeight: 900, fontSize: '0.95rem', color: '#3A3052',
        }}>🧹 けす</button>
        <button onClick={next} style={{
          padding: '10px 18px', borderRadius: '999px',
          background: '#fff', border: '3px solid #3A3052', boxShadow: '0 3px 0 #3A3052',
          fontWeight: 900, fontSize: '0.95rem', color: '#3A3052',
        }}>つぎ →</button>
      </div>
      <div className="flex-center" style={{ marginTop: '12px' }}>
        <button onClick={complete} style={{
          padding: '14px 32px', borderRadius: '999px',
          background: '#FFB5D8', border: '4px solid #3A3052', boxShadow: '0 5px 0 #3A3052',
          fontWeight: 900, fontSize: '1.15rem', color: '#3A3052',
        }}>🎉 かけた！</button>
      </div>
      <Sparkles show={done} />
    </div>
  );
}
 
// ======== くらべっこ ========
function CompareMode({ onBack, range, awardSticker }) {
  const [pair, setPair] = useState(null);
  const [result, setResult] = useState(null);
  const [score, setScore] = useState(0);

  const pickPair = () => {
    const max = Math.max(2, range);
    let a = 1 + Math.floor(Math.random() * max);
    let b = 1 + Math.floor(Math.random() * max);
    while (b === a) b = 1 + Math.floor(Math.random() * max);
    setPair({ a, b });
    setResult(null);
    setTimeout(() => speak('どっちが おおい かな？', 0.85, 1.3), 300);
  };
  useEffect(() => { pickPair(); }, [range]);

  const pick = (chosen) => {
    if (result) return;
    const big = Math.max(pair.a, pair.b);
    if (chosen === big) {
      setResult('correct');
      const nextScore = score + 1;
      setScore(nextScore);
      playChime('success');
      setTimeout(() => speak(`${NUMBERS[big - 1].hira} の ほうが おおい！せいかい！`, 0.9, 1.35), 200);
      if (nextScore % 5 === 0) awardSticker && awardSticker('compare', `くらべっこ ${nextScore}もん`);
      setTimeout(pickPair, 2400);
    } else {
      setResult('wrong'); playChime('gentle');
      setTimeout(() => speak('もういちど みてみよう', 0.85, 1.3), 200);
      setTimeout(() => setResult(null), 1400);
    }
  };

  const renderDots = (n) => {
    const maxShow = Math.min(n, 20);
    return Array.from({ length: maxShow }, (_, i) => (
      <span key={i} className="compare-dot">🐰</span>
    )).concat(n > maxShow ? [<span key="plus" className="compare-dot" style={{fontSize:'0.9rem', color:'#7A6B94', fontWeight:900}}>+{n - maxShow}</span>] : []);
  };

  if (!pair) return null;
  const big = Math.max(pair.a, pair.b);

  return (
    <div className="screen compare-bg">
      <BackButton onClick={onBack} />
      <div className="score-badge"><span>⭐</span><span>{score}</span></div>
      <h2 className="title" style={{ fontSize: '1.3rem', marginTop: '8px' }}>⚖️ どっちが おおい？</h2>
      <div className="flex-col-center" style={{ marginTop: '8px' }}>
        <div style={{ animation: result === 'correct' ? 'cheer 0.6s ease-in-out 3' : 'floaty 2.5s ease-in-out infinite' }}>
          <Rabbit mood={result === 'correct' ? 'wow' : 'happy'} size={88} />
        </div>
      </div>
      <div className="compare-grid">
        {[pair.a, pair.b].map((n, i) => {
          const isWinner = result === 'correct' && n === big;
          const isLoser  = result === 'correct' && n !== big;
          return (
            <button key={i} className={'compare-card' + (isWinner ? ' winner' : isLoser ? ' loser' : '')}
              onClick={() => pick(n)} disabled={!!result}
              style={{ background: NUMBERS[n - 1].bgSoft, animationDelay: `${i * 0.1}s` }}>
              <div className="compare-digit" style={{ color: NUMBERS[n - 1].color }}>{n}</div>
              <div style={{ fontWeight: 900, fontSize: '0.95rem', color: '#3A3052' }}>{NUMBERS[n - 1].hira}</div>
              <div className="compare-dots">{renderDots(n)}</div>
            </button>
          );
        })}
      </div>
      <Sparkles show={result === 'correct'} />
    </div>
  );
}

// ======== けいさん ========
function MathMode({ onBack, range, awardSticker }) {
  const [question, setQuestion] = useState(null);
  const [choices, setChoices] = useState([]);
  const [result, setResult] = useState(null);
  const [score, setScore] = useState(0);

  const pickQuestion = () => {
    const limit = Math.min(range, 20);
    const op = Math.random() < 0.5 ? '+' : '-';
    let a, b, ans;
    if (op === '+') {
      const total = 2 + Math.floor(Math.random() * (limit - 1));
      a = 1 + Math.floor(Math.random() * (total - 1));
      b = total - a;
      ans = total;
    } else {
      a = 2 + Math.floor(Math.random() * (limit - 1));
      b = 1 + Math.floor(Math.random() * (a - 1));
      ans = a - b;
    }
    const distractSet = new Set();
    while (distractSet.size < 2) {
      const delta = (Math.random() < 0.5 ? -1 : 1) * (1 + Math.floor(Math.random() * 3));
      const d = ans + delta;
      if (d >= 0 && d !== ans && d <= limit) distractSet.add(d);
    }
    const opts = [ans, ...Array.from(distractSet)].sort(() => Math.random() - 0.5);
    setQuestion({ a, b, op, ans });
    setChoices(opts);
    setResult(null);
    const opSpeak = op === '+' ? 'たす' : 'ひく';
    setTimeout(() => speak(`${NUMBERS[a-1].hira}　${opSpeak}　${NUMBERS[b-1].hira}　は？`, 0.8, 1.3), 300);
  };
  useEffect(() => { pickQuestion(); }, [range]);

  const pick = (v) => {
    if (result) return;
    if (v === question.ans) {
      setResult('correct');
      const nextScore = score + 1;
      setScore(nextScore);
      playChime('success');
      setTimeout(() => speak(`${NUMBERS[question.ans - 1].hira}！せいかい！`, 0.9, 1.4), 200);
      if (nextScore % 5 === 0) awardSticker && awardSticker('math', `けいさん ${nextScore}もん`);
      setTimeout(pickQuestion, 2200);
    } else {
      setResult('wrong'); playChime('gentle');
      setTimeout(() => speak('もういちど かんがえてみよう', 0.85, 1.3), 200);
      setTimeout(() => setResult(null), 1400);
    }
  };

  if (!question) return null;
  const { a, b, op } = question;
  const picA = Array.from({ length: Math.min(a, 12) }, (_, i) => <span key={i} className="math-pic">🐰</span>);
  const picB = Array.from({ length: Math.min(b, 12) }, (_, i) => <span key={i} className="math-pic">🥕</span>);

  return (
    <div className="screen math-bg">
      <BackButton onClick={onBack} />
      <div className="score-badge"><span>⭐</span><span>{score}</span></div>
      <h2 className="title" style={{ fontSize: '1.3rem', marginTop: '8px' }}>
        ➕ {op === '+' ? 'たしざん' : 'ひきざん'}
      </h2>
      <div className="math-equation">
        <span>{a}</span>
        <span className="math-op">{op}</span>
        <span>{b}</span>
        <span className="math-op">=</span>
        <span style={{ color: result === 'correct' ? '#4A8A2A' : '#B8B5FF' }}>？</span>
      </div>
      <div className="math-pic-row">
        <div className="math-pic-group">{picA}{a > 12 && <span style={{fontWeight:900, color:'#7A6B94'}}>+{a-12}</span>}</div>
        <div className="math-op" style={{ fontSize: '2.2rem' }}>{op}</div>
        <div className="math-pic-group">{picB}{b > 12 && <span style={{fontWeight:900, color:'#7A6B94'}}>+{b-12}</span>}</div>
      </div>
      <div className="choices-grid" style={{ marginTop: '16px' }}>
        {choices.map((c, i) => {
          const isCorrect = result === 'correct' && c === question.ans;
          const isWrong = result === 'wrong' && c !== question.ans;
          return (
            <button key={c + '-' + i} className="choice-btn"
              onClick={() => pick(c)} disabled={!!result}
              style={{
                background: isCorrect ? '#B8E986' : '#fff',
                opacity: isWrong ? 0.5 : 1,
                animationDelay: `${i * 0.08}s`,
              }}>
              <div className="choice-digit">{c}</div>
              <div className="choice-hira">{NUMBERS[c - 1] ? NUMBERS[c - 1].hira : 'ぜろ'}</div>
            </button>
          );
        })}
      </div>
      <Sparkles show={result === 'correct'} />
    </div>
  );
}

  };

      const nextScore = score + 1;
      setScore(nextScore);
      playChime('success');
      setTimeout(() => speak(`${NUMBERS[story.ans - 1].hira}！せいかい！`, 0.9, 1.4), 200);
      if (nextScore % 5 === 0) awardSticker && awardSticker('story', `おはなし ${nextScore}もん`);
      setTimeout(nextProblem, 2500);
    } else {
      setResult('wrong');
      playChime('gentle');
      setTimeout(() => speak('もういちど かんがえてみよう', 0.85, 1.3), 200);
      setTimeout(() => setResult(null), 1400);
    }
  };

  const picA = Array.from({ length: Math.min(story.a, 10) }, (_, i) => (
    <span key={i} className="story-emoji">{story.emoji}</span>
  ));
  const picB = Array.from({ length: Math.min(story.b, 10) }, (_, i) => (
    <span key={i} className="story-emoji">{story.emoji}</span>
  ));

  return (
    <div className="screen story-bg">
      <BackButton onClick={onBack} />
      <div className="score-badge"><span>⭐</span><span>{score}</span></div>
      <h2 className="title" style={{ fontSize: '1.3rem', marginTop: '8px' }}>
        🧸 おはなし もんだい
      </h2>
      <div className="story-card">{story.text}</div>
      <div className="story-emoji-row">
        <div className="story-emoji-group">{picA}</div>
        <div className="math-op" style={{ fontSize: '2rem' }}>{story.op === '+' ? '+' : '−'}</div>
        <div className="story-emoji-group">{picB}</div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <button className="story-replay-btn" onClick={replay} disabled={!!result}>
          🔊 もういちど きく
        </button>
      </div>
      <div className="choices-grid" style={{ marginTop: '14px' }}>
        {choices.map((c, i) => {
          const isCorrect = result === 'correct' && c === story.ans;
          const isWrong = result === 'wrong' && c !== story.ans;
          return (
            <button key={c + '-' + i} className="choice-btn"
              onClick={() => pick(c)} disabled={!!result}
              style={{
                background: isCorrect ? '#B8E986' : '#fff',
                opacity: isWrong ? 0.5 : 1,
                animationDelay: `${i * 0.08}s`,
              }}>
              <div className="choice-digit">{c}</div>
              <div className="choice-hira">{NUMBERS[c - 1] ? NUMBERS[c - 1].hira : 'ぜろ'}</div>
            </button>
          );
        })}
      </div>
      <Sparkles show={result === 'correct'} />
    </div>
  );
}

// ======== かぞえかた（助数詞） ========
function CounterMode({ onBack, awardSticker }) {
  const [cIdx, setCIdx] = useState(0);
  const [count, setCount] = useState(1);
  const [done, setDone] = useState(false);
  const counter = COUNTERS[cIdx];
  const reading = counter.forms[Math.min(count, counter.forms.length) - 1];

  useEffect(() => {
    setCount(1); setDone(false);
  }, [cIdx]);

  const sayIt = () => { playChime('pop'); speak(reading, 0.8, 1.35); };
  const up = () => {
    if (count >= 10) return;
    const n = count + 1;
    setCount(n);
    playChime('pop');
    setTimeout(() => speak(counter.forms[n - 1], 0.8, 1.35), 60);
    if (n === 10 && !done) {
      setDone(true);
      setTimeout(() => {
        playChime('success');
        speak(`${counter.label} じゅっこまで いえたね！`, 0.85, 1.3);
        awardSticker && awardSticker('counter', `${counter.label} 10まで`);
      }, 900);
    }
  };
  const down = () => {
    if (count <= 1) return;
    const n = count - 1;
    setCount(n);
    playChime('pop');
    setTimeout(() => speak(counter.forms[n - 1], 0.8, 1.35), 60);
  };

  const items = Array.from({ length: count }, (_, i) => (
    <span key={i} className="counter-item">{counter.emoji}</span>
  ));

  return (
    <div className="screen counter-bg">
      <BackButton onClick={onBack} />
      <h2 className="title" style={{ fontSize: '1.3rem', marginTop: '8px' }}>🐰 かぞえかた</h2>
      <p className="subtitle" style={{ fontSize: '0.85rem', marginTop: '4px' }}>
        ものによって かぞえかたが ちがうよ
      </p>
      <div className="counter-tabs">
        {COUNTERS.map((c, i) => (
          <button key={c.id}
            className={'counter-tab' + (i === cIdx ? ' active' : '')}
            onClick={() => { playChime('pop'); setCIdx(i); }}
            style={{ background: i === cIdx ? c.color : '#fff' }}>
            {c.emoji} {c.label}
          </button>
        ))}
      </div>
      <div className="counter-stage" style={{ background: counter.bgSoft }}>
        <div style={{ textAlign: 'center', fontWeight: 900, fontSize: '0.9rem', color: '#7A6B94' }}>
          {counter.reading}
        </div>
        <div className="counter-items">{items}</div>
        <button onClick={sayIt} style={{
          display: 'block', margin: '4px auto 0',
          padding: '6px 18px', borderRadius: '999px',
          background: '#fff', border: '3px solid #3A3052', boxShadow: '0 3px 0 #3A3052',
          fontWeight: 900, fontSize: '0.85rem', color: '#3A3052',
        }}>🔊 きく</button>
        <div className="counter-reading" style={{ marginTop: '8px' }}>{reading}</div>
        <div className="counter-stepper">
          <button className="counter-step-btn" onClick={down} disabled={count <= 1}>−</button>
          <div style={{ fontFamily: 'Fredoka, sans-serif', fontSize: '2.6rem', fontWeight: 700, color: counter.color }}>
            {count}
          </div>
          <button className="counter-step-btn" onClick={up} disabled={count >= 10}>＋</button>
        </div>
      </div>
      <Sparkles show={done} />
    </div>
  );
}

// ======== シールちょう ========
function StickerBook({ onBack, stickers, setStickers }) {
  const fileInputRef = useRef(null);

  const doExport = async () => {
    playChime('pop');
    const all = await dbAll();
    const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = `suuji-no-mori-${date}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  };

  const onImportFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        const imported = data && Array.isArray(data.stickers) ? data.stickers : null;
        if (!imported) { alert('このファイルは よみこめません'); return; }
        if (!confirm(`${imported.length}まいの シールを よみこみます。いまの きろくに うわがきします。`)) return;
        setStickers(imported);
        if (typeof data.range === 'number') await dbSet('range', data.range);
        playChime('success');
        speak('よみこみ できたよ', 0.9, 1.35);
      } catch (err) {
        alert('ファイルが こわれているみたい');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const clearAll = () => {
    if (!confirm('ぜんぶの シールを けしますか？')) return;
    setStickers([]);
    playChime('gentle');
  };

  return (
    <div className="screen stickers-bg">
      <BackButton onClick={onBack} />
      <h2 className="title" style={{ fontSize: '1.5rem', marginTop: '8px' }}>🎖 シールちょう</h2>
      <p className="subtitle" style={{ fontSize: '0.9rem', marginTop: '4px' }}>
        {stickers.length > 0 ? `${stickers.length}まい あつめたよ！` : 'あそんで シールを あつめよう'}
      </p>
      <div className="sticker-grid">
        {stickers.length === 0 ? (
          <div className="sticker-empty">まだ シールが ないよ 🐰</div>
        ) : (
          stickers.slice().reverse().map((s, i) => (
            <div key={s.id} className="sticker-cell"
              title={s.label}
              style={{
                background: PALETTE[i % PALETTE.length].bgSoft,
                animationDelay: `${Math.min(i * 0.02, 0.5)}s`,
              }}>
              {s.emoji}
            </div>
          ))
        )}
      </div>
      <div className="backup-btns">
        <button className="backup-btn" onClick={doExport}>💾 ほぞん（ファイル）</button>
        <button className="backup-btn" onClick={() => fileInputRef.current && fileInputRef.current.click()}>
          📂 よみこみ
        </button>
        <button className="backup-btn" onClick={clearAll} style={{ color: '#B55' }}>🗑 ぜんぶ けす</button>
      </div>
      <p style={{ fontWeight: 700, fontSize: '0.75rem', color: '#9A8DB4', textAlign: 'center', marginTop: '10px', padding: '0 20px' }}>
        ※ きろくは このタブレット/スマホの なかに ほぞんされます。<br />
        スマホを かえる ときは 「ほぞん」で ファイルに しておけば あんしん！
      </p>
      <input ref={fileInputRef} type="file" accept="application/json"
        onChange={onImportFile} style={{ display: 'none' }} />
    </div>
  );
}

// ======== メイン ========
function App() {
  const [mode, setMode] = useState('home');
  const [range, setRangeRaw, rangeLoaded] = useStored('range', 10);
  const [stickers, setStickersRaw] = useStored('stickers', []);

  const setRange = (r) => setRangeRaw(r);
  const setStickers = (next) => setStickersRaw(next);
  const awardSticker = (kind, label) => {
    const s = makeSticker(kind, label);
    setStickersRaw(prev => {
      const next = prev.concat(s);
      return next.length > 200 ? next.slice(next.length - 200) : next;
    });
  };

  useEffect(() => {
    loadJaVoice();
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = loadJaVoice;
    }
    const unlock = () => {
      try { getCtx().resume(); } catch (e) {}
      speak(' ', 1, 1);
      document.removeEventListener('touchstart', unlock);
      document.removeEventListener('click', unlock);
    };
    document.addEventListener('touchstart', unlock, { once: true });
    document.addEventListener('click', unlock, { once: true });
  }, []);

  if (!rangeLoaded) {
    return (
      <div className="screen home-bg flex-col-center" style={{ justifyContent: 'center' }}>
        <div style={{ animation: 'floaty 2s ease-in-out infinite' }}>
          <Rabbit mood="happy" size={100} />
        </div>
        <p style={{ fontWeight: 900, color: '#7A6B94', marginTop: '14px' }}>よみこみちゅう…</p>
      </div>
    );
  }

  const back = () => setMode('home');
  return (
    <>
      {mode === 'home'     && <Home setMode={setMode} range={range} setRange={setRange} stickerCount={stickers.length} />}
      {mode === 'count'    && <CountMode   onBack={back} range={range} awardSticker={awardSticker} />}
      {mode === 'read'     && <ReadMode    onBack={back} range={range} />}
      {mode === 'listen'   && <ListenMode  onBack={back} range={range} awardSticker={awardSticker} />}
      {mode === 'speak'    && <SpeakMode   onBack={back} range={range} awardSticker={awardSticker} />}
      {mode === 'write'    && <WriteMode   onBack={back} range={range} awardSticker={awardSticker} />}
      {mode === 'compare'  && <CompareMode onBack={back} range={range} awardSticker={awardSticker} />}
      {mode === 'math'     && <MathMode    onBack={back} range={range} awardSticker={awardSticker} />}
      {mode === 'story'    && <StoryMode   onBack={back} awardSticker={awardSticker} />}
      {mode === 'counter'  && <CounterMode onBack={back} awardSticker={awardSticker} />}
      {mode === 'stickers' && <StickerBook onBack={back} stickers={stickers} setStickers={setStickers} />}
    </>
  );
}
 
const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
